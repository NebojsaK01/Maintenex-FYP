<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Alerts</title>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <!-- Left side -->
        <div class="navbar-left">
            <img src="{{ url_for('static', filename='images/maintenex logo.png') }}" alt="Logo" class="dashboard-logo">
            <h2>Alerts</h2>
        </div>

        <!-- Right side -->
        <div class="navbar-right">
            <div class="dropdown">
                <!-- Hamburger icon -->
                <div class="hamburger">
                    &#9776; <!-- Unicode for 3 lines -->
                </div>
                <!-- Dropdown menu -->
                <div class="dropdown-content">
                    <a href="{{ url_for('dashboard') }}"><button class="dropdown-btn">Dashboard</button></a>
                    <a href="{{ url_for('alerts') }}"><button class="dropdown-btn">Alerts</button></a>
                
                    <a href="{{ url_for('employees') }}"><button class="dropdown-btn">Employees</button></a>
                    {% if session.get('role') == 'admin' %}
                    <a href="{{ url_for('employee_management') }}">
                        <button class="dropdown-btn">Employee Management</button>
                    </a>
                    {% endif %}
                    <a href="{{ url_for('assets') }}"><button class="dropdown-btn">Assets</button></a>
                    <a href="{{ url_for('synthetic_machine') }}"><button class="dropdown-btn">Synthetic Machine</button></a>
                    <a href="{{ url_for('profile') }}"><button class="dropdown-btn">Profile</button></a>
                    <a href="{{ url_for('logout') }}"><button class="dropdown-btn logout-btn">Logout</button></a>
                </div>
            </div>
        </div>
    </nav>



    <!-- Alerts content 
    <div class="alerts-page-container">
        <h1>Alerts</h1>

        <!Alerts list container 
        <div class="alerts-container">
            <!Example alert items 
            <div class="alert-item alert-high">
                <p><strong>High Priority:</strong> Machine #23 needs immediate maintenance.</p>
                <span class="alert-timestamp">2026-01-25 10:15 AM</span>
            </div>

            <div class="alert-item alert-medium">
                <p><strong>Medium Priority:</strong> Filter replacement scheduled for Machine #12.</p>

            </div>

            </div>
        </div>
    </div>-->

    

    <div class="alerts-box">
        <h1>Alerts</h1>

        {% if alerts %}
            {% for alert in alerts %}
                <div class="alert-card alert-{{ alert.priority|lower }}">
                    <div class="alert-left">
                        <strong>{{ alert.priority }} Priority:</strong>
                    </div>
                    <div class="alert-right">
                        Asset <strong>{{ alert.asset_code }}</strong> needs servicing.
                        <div class="alert-date">{{ alert.next_service_date }}</div>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <p>No alerts at this time.</p>
        {% endif %}
    </div>





</body>
</html>
